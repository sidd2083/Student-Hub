kind = "web"
previewPath = "/"
title = "Student Hub"
version = "1.0.0"
id = "artifacts/student-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22581

[services.development]
run = "pnpm --filter @workspace/student-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-hub", "run", "build" ]
publicDir = "artifacts/student-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22581"
BASE_PATH = "/"
