<!DOCTYPE html>
<html lang="en-NP">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover" />

    <!-- ── Primary SEO ───────────────────────────────────────────────────── -->
    <title>Student Hub — Free Study Platform for Nepal Grade 9–12</title>
    <meta name="description" content="Free study platform for Grade 9–12 students in Nepal. Notes, PYQs, MCQ practice, AI tutor, Pomodoro timer, and progress tracking for SEE and NEB exams." />
    <meta name="keywords" content="student hub nepal, grade 10 notes, SEE preparation, NEB notes, PYQ nepal, free notes nepal, MCQ practice nepal, study tracker nepal, SEE 2081, NEB 2081" />
    <meta name="author" content="Student Hub Nepal" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="language" content="English" />

    <!-- ── Geo / Region ───────────────────────────────────────────────────── -->
    <meta name="geo.region" content="NP" />
    <meta name="geo.placename" content="Nepal" />

    <!-- ── Open Graph (Facebook / WhatsApp / LinkedIn) ───────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://studenthub.np/" />
    <meta property="og:site_name" content="Student Hub Nepal" />
    <meta property="og:title" content="Student Hub — Free Study Platform for Nepal Grade 9–12" />
    <meta property="og:description" content="Free notes, PYQs, MCQ practice, AI tutor and progress tracking for Grade 9–12 students in Nepal. Built for SEE and NEB exam preparation." />
    <meta property="og:image" content="https://studenthub.np/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Student Hub Nepal — Free Study Platform" />
    <meta property="og:locale" content="en_NP" />

    <!-- ── Twitter / X Card ──────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Student Hub — Free Study Platform for Nepal Grade 9–12" />
    <meta name="twitter:description" content="Free notes, PYQs, MCQ practice, AI tutor and progress tracking for Grade 9–12 students in Nepal." />
    <meta name="twitter:image" content="https://studenthub.np/opengraph.jpg" />
    <meta name="twitter:image:alt" content="Student Hub Nepal" />

    <!-- ── Canonical ─────────────────────────────────────────────────────── -->
    <link rel="canonical" href="https://studenthub.np/" />

    <!-- ── PWA / Icons ───────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Student Hub" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- ── Performance: preconnect external origins ──────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://securetoken.googleapis.com" />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com" />

    <!-- ── Font: non-render-blocking, display=swap ───────────────────────── -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <!--
      Boot splash — rendered by the browser from HTML BEFORE any JavaScript runs.
      Shows the logo instantly on PWA open and browser cold-start.
      React replaces this content when it mounts (createRoot overwrites #root).
    -->
    <div id="root"><div id="boot-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#ffffff;z-index:9999;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"><div style="width:72px;height:72px;background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);border-radius:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(59,130,246,.4);margin-bottom:16px"><svg width="42" height="42" viewBox="0 0 180 180" fill="none"><path d="M90 44 C90 44 56 39 36 48 L36 136 C56 127 90 132 90 132 L90 44Z" fill="white" fill-opacity=".95"/><path d="M90 44 C90 44 124 39 144 48 L144 136 C124 127 90 132 90 132 L90 44Z" fill="white" fill-opacity=".7"/><line x1="90" y1="44" x2="90" y2="132" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/></svg></div><p style="font-size:17px;font-weight:600;color:#111827;margin:0 0 4px;letter-spacing:-.01em">Student Hub</p><p style="font-size:13px;color:#6b7280;margin:0">Study smarter. Rank higher.</p></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
