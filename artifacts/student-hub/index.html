<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Student Hub — Free Study Platform for Nepal Grade 9–12</title>
    <meta name="description" content="Free study platform for Grade 9–12 students in Nepal. Notes, PYQs, MCQ practice, AI tutor, Pomodoro timer, and progress tracking." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Student Hub" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Preconnect to external origins ASAP -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://securetoken.googleapis.com" />
    <link rel="dns-prefetch" href="https://generativelanguage.googleapis.com" />

    <!-- Font: non-render-blocking with display=swap -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Content protection: disable right-click and common inspect shortcuts -->
    <script>
      (function() {
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
          if (
            e.key === 'F12' ||
            (e.ctrlKey && e.shiftKey && ['I','J','C','K'].includes(e.key)) ||
            (e.ctrlKey && e.key === 'U') ||
            (e.metaKey && e.altKey && ['I','J','C'].includes(e.key))
          ) {
            e.preventDefault();
            return false;
          }
        });
        document.addEventListener('selectstart', function(e) {
          if (e.target && (e.target.tagName === 'IMG' || e.target.tagName === 'A')) {
            e.preventDefault();
          }
        });
      })();
    </script>
  <!-- Inline splash: renders before any JS, eliminates white screen on PWA cold start -->
  <style>
    #app-loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #f9fafb;
      transition: opacity 0.25s ease;
    }
    #app-loading .al-icon {
      width: 56px; height: 56px;
      background: #3b82f6; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      animation: al-pulse 1.6s ease-in-out infinite;
    }
    #app-loading .al-title {
      margin-top: 14px;
      font-size: 15px; font-weight: 600; color: #111827;
      font-family: system-ui, -apple-system, sans-serif;
      letter-spacing: -0.01em;
    }
    #app-loading .al-bar {
      margin-top: 20px; width: 40px; height: 3px;
      background: #e5e7eb; border-radius: 99px; overflow: hidden;
    }
    #app-loading .al-bar-fill {
      height: 100%; width: 40%; background: #3b82f6; border-radius: 99px;
      animation: al-slide 1s ease-in-out infinite alternate;
    }
    @keyframes al-pulse {
      0%, 100% { transform: scale(1);    opacity: 1; }
      50%       { transform: scale(.94); opacity: .88; }
    }
    @keyframes al-slide {
      from { transform: translateX(0); }
      to   { transform: translateX(150%); }
    }
  </style>
  </head>
  <body>
    <!-- Splash shown before React mounts — removed by App.tsx on first render -->
    <div id="app-loading" aria-hidden="true">
      <div class="al-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <p class="al-title">Student Hub</p>
      <div class="al-bar"><div class="al-bar-fill"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
